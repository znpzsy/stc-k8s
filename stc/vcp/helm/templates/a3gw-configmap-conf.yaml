# A3GW configuration JSON files overridden at release build (mount at /space/a3gw/src/conf)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vcp.a3gw.configmapConfName" . }}
  namespace: {{ include "consolportals.namespace" . }}
  labels:
    component: vcp-a3gw
data:
  server_config.json: |
{{ .Files.Get "files/a3gw/conf/server_config.json" | indent 4 }}

  logger_config.json: |
{{ .Files.Get "files/a3gw/conf/logger_config.json" | indent 4 }}

  idle_config.json: |
{{ .Files.Get "files/a3gw/conf/idle_config.json" | indent 4 }}

  auth_config.json: |
{{ .Files.Get "files/a3gw/conf/auth_config.json" | indent 4 }}

  operations_config.json: |
{{ .Files.Get "files/a3gw/conf/operations_config.json" | indent 4 }}
